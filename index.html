```html
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ChocolaTrichomes</title>

<style>

:root{
--gold:#D9C28A;
--bg:#0B0B0E;
--card:#14141A;
--text:#F5F5F7;
--muted:#8E8E93;
--success:#32cd32;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
padding-bottom:90px;
}

.header{
position:sticky;
top:0;
z-index:100;
background:#0f0f12;
border-bottom:1px solid rgba(217,194,138,.15);
padding:14px 16px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:var(--gold);
font-weight:800;
letter-spacing:2px;
font-size:14px;
}

.city{
font-size:12px;
padding:6px 10px;
background:rgba(217,194,138,.1);
border:1px solid rgba(217,194,138,.2);
border-radius:20px;
color:var(--gold);
}

.hero{
height:220px;
background:linear-gradient(
135deg,
#1b1b1f,
#0d0d10
);
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
}

.section-title{
padding:20px 16px 12px;
font-size:18px;
font-weight:700;
color:var(--gold);
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:0 12px;
}

.card{
background:var(--card);
border-radius:18px;
overflow:hidden;
border:1px solid rgba(255,255,255,.05);
}

.image{
height:180px;
background:#1d1d23;
display:flex;
align-items:center;
justify-content:center;
font-size:52px;
}

.info{
padding:12px;
}

.stock{
display:inline-flex;
align-items:center;
gap:6px;
font-size:10px;
color:var(--success);
margin-bottom:8px;
}

.dot{
width:6px;
height:6px;
border-radius:50%;
background:var(--success);
}

.name{
font-size:13px;
font-weight:700;
margin-bottom:6px;
}

.price{
font-size:18px;
font-weight:800;
}

.price span{
font-size:11px;
color:var(--muted);
}

.add{
margin-top:10px;
width:100%;
border:none;
background:var(--gold);
color:#111;
padding:10px;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:#0f0f12;
border-top:1px solid rgba(255,255,255,.05);
display:flex;
justify-content:space-around;
align-items:center;
}

.nav-item{
text-align:center;
font-size:11px;
color:var(--muted);
}

.nav-item.active{
color:var(--gold);
}

.cart{
position:fixed;
right:18px;
bottom:90px;
width:60px;
height:60px;
border-radius:50%;
background:var(--gold);
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
cursor:pointer;
box-shadow:0 10px 30px rgba(217,194,138,.3);
}

</style>
</head>
<body>

<header class="header">
<div class="logo">CHOCOLATRICHOMES</div>
<div class="city">📍 Rabat</div>
</header>

<section class="hero">
🌿
</section>

<h2 class="section-title">
Produits populaires
</h2>

<section class="products">

<div class="card">
<div class="image">🧊</div>
<div class="info">
<div class="stock">
<div class="dot"></div>
In Stock
</div>
<div class="name">Kinky Pam 160-73u</div>
<div class="price">180 DH <span>/g</span></div>
<button class="add">Ajouter</button>
</div>
</div>

<div class="card">
<div class="image">🍫</div>
<div class="info">
<div class="stock">
<div class="dot"></div>
In Stock
</div>
<div class="name">Honey Roasted Peanut</div>
<div class="price">70 DH <span>/g</span></div>
<button class="add">Ajouter</button>
</div>
</div>

<div class="card">
<div class="image">🌿</div>
<div class="info">
<div class="stock">
<div class="dot"></div>
In Stock
</div>
<div class="name">Beldia Issagen #1</div>
<div class="price">30 DH <span>/g</span></div>
<button class="add">Ajouter</button>
</div>
</div>

<div class="card">
<div class="image">🔥</div>
<div class="info">
<div class="stock">
<div class="dot"></div>
In Stock
</div>
<div class="name">RAW Black</div>
<div class="price">20 DH</div>
<button class="add">Ajouter</button>
</div>
</div>

</section>

<div class="cart">
🛒
</div>

<nav class="bottom-nav">
<div class="nav-item active">Accueil</div>
<div class="nav-item">Recherche</div>
<div class="nav-item">Favoris</div>
<div class="nav-item">Panier</div>
<div class="nav-item">Profil</div>
</nav>

</body>
</html>
```
